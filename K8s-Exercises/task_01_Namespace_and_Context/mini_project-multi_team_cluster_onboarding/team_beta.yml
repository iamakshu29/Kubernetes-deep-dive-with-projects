apiVersion: v1
kind: Namespace
metadata:
  labels:
    team: beta
  name: team-beta

---

apiVersion: v1
kind: LimitRange
metadata:
  name: team-beta-limits
  namespace: team-beta
spec:
  limits:
  - default: # this section defines default limits
      cpu: 500m
      memory: 256Mi
    defaultRequest: # this section defines default requests
      cpu: 100m
      memory: 128Mi
    max: # max and min define the limit range
      cpu: "1"
    min:
      cpu: 50m
    type: Container
   
---

apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-beta-quota
  namespace: team-beta
spec:
  hard:
    limits.cpu: "1"
    limits.memory: 2Gi
    pods: "6"